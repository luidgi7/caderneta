<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Manager — Login</title>
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Manager — Login</title>
  <link rel="icon" type="image/png" href="image_6002f8.png">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
  <style>
    /* --- Variáveis de Cor (Modo Claro Padrão) --- */
    :root {
      --bg-body: #1a1a2e;
      --card-bg: white;
      --text-main: #1a1a2e;
      --text-sub: #888;
      --tab-bg: #f5f5f5;
      --tab-text: #555;
      --input-border: #ddd;
      --input-text: #333;
      --toggle-btn-bg: rgba(255, 255, 255, 0.1);
      --toggle-btn-text: white;
    }

    /* --- Variáveis de Cor (Modo Escuro Ativo) --- */
    body.dark-theme {
      --bg-body: #0f0f1a;
      --card-bg: #161625;
      --text-main: #ffffff;
      --text-sub: #aaa;
      --tab-bg: #222235;
      --tab-text: #bbb;
      --input-border: #3f3f5a;
      --input-text: #ffffff;
      --toggle-btn-bg: rgba(255, 255, 255, 0.2);
      --toggle-btn-text: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: Arial, sans-serif; 
      background: var(--bg-body); 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
      padding: 20px; 
      transition: background 0.3s;
    }

    /* --- Botão unificado de Tema --- */
    .theme-toggle-container {
      width: 100%;
      max-width: 380px;
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .theme-toggle-btn {
      background: var(--toggle-btn-bg);
      color: var(--toggle-btn-text);
      border: none;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .theme-toggle-btn:hover {
      opacity: 0.9;
    }

    /* --- Estrutura do Card --- */
    .card { 
      background: var(--card-bg); 
      border-radius: 16px; 
      padding: 36px 28px; 
      width: 100%; 
      max-width: 380px; 
      box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
      transition: background 0.3s;
    }

    h1 { text-align: center; font-size: 22px; margin-bottom: 6px; color: var(--text-main); transition: color 0.3s; }
    .subtitle { text-align: center; color: var(--text-sub); font-size: 14px; margin-bottom: 28px; transition: color 0.3s; }
    
    .tabs { display: flex; border-radius: 10px; overflow: hidden; border: 1px solid var(--input-border); margin-bottom: 24px; transition: border 0.3s; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; background: var(--tab-bg); color: var(--tab-text); font-weight: bold; font-size: 15px; border: none; transition: all 0.2s; }
    .tab.active { background: #1a1a2e; color: white; }
    body.dark-theme .tab.active { background: #3f3f5a; color: white; }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 5px; font-weight: bold; transition: color 0.3s; }
    
    input { 
      width: 100%; 
      padding: 13px; 
      border: 1px solid var(--input-border); 
      background: var(--card-bg);
      color: var(--input-text);
      border-radius: 8px; 
      font-size: 16px; 
      outline: none; 
      transition: all 0.3s; 
    }
    input:focus { border-color: #1a1a2e; }
    body.dark-theme input:focus { border-color: #ffffff; }

    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 6px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.88; }
    .btn-login { background: #1a1a2e; color: white; }
    body.dark-theme .btn-login { background: #3f3f5a; }
    .btn-signup { background: #28a745; color: white; }
    
    #msg { margin-top: 14px; text-align: center; font-size: 14px; min-height: 20px; }
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>

<div class="theme-toggle-container">
  <button class="theme-toggle-btn" id="theme-btn">
    <span id="theme-icon">🌙</span> <span id="theme-text">Modo Escuro</span>
  </button>
</div>

<div class="card">
  <h1>🔗 Link Manager</h1>
  <p class="subtitle">Organize os teus links por categorias</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('signup')">Criar Conta</button>
  </div>

  <!-- LOGIN -->
  <div class="panel active" id="panel-login">
    <div class="form-group">
      <label>Username</label>
      <input id="login-user" placeholder="O teu username" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-login" onclick="login()">Entrar</button>
  </div>

  <!-- SIGNUP -->
  <div class="panel" id="panel-signup">
    <div class="form-group">
      <label>Username</label>
      <input id="signup-user" placeholder="Escolhe um username" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="signup-pass" type="password" placeholder="Mínimo 4 caracteres" autocomplete="new-password">
    </div>
    <button class="btn btn-signup" onclick="signup()">Criar Conta</button>
  </div>

  <p id="msg"></p>
</div>

<script>
  const SUPABASE_URL = "https://dasdhmgqldpqfcxmzgkl.supabase.co";
  const SUPABASE_KEY = "sb_publishable_9MnjCDP_KC7wa_DMom1gsA_DCF65g42";

  // --- Lógica de Sincronização do Dark Mode ---
  const themeBtn = document.getElementById('theme-btn');
  const themeIcon = document.getElementById('theme-icon');
  const themeText = document.getElementById('theme-text');

  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-theme');
    themeIcon.textContent = '☀️';
    themeText.textContent = 'Modo Claro';
  }

  themeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark-theme');
    
    if (document.body.classList.contains('dark-theme')) {
      themeIcon.textContent = '☀️';
      themeText.textContent = 'Modo Claro';
      localStorage.setItem('theme', 'dark');
    } else {
      themeIcon.textContent = '🌙';
      themeText.textContent = 'Modo Escuro';
      localStorage.setItem('theme', 'light');
    }
  });

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
    document.getElementById('panel-login').classList.toggle('active', tab==='login');
    document.getElementById('panel-signup').classList.toggle('active', tab==='signup');
    document.getElementById('msg').textContent = '';
  }

  function setMsg(text, color='red') {
    const m = document.getElementById('msg');
    m.textContent = text;
    m.style.color = color;
  }

  async function hashPassword(p) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  async function login() {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pass').value;
    if (!username || !password) { setMsg('Preenche todos os campos.'); return; }
    const hash = await hashPassword(password);
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users?username=eq.${encodeURIComponent(username)}&password_hash=eq.${hash}&select=*`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    if (!data || data.length === 0) { setMsg('Username ou password incorretos.'); return; }
    localStorage.setItem('user', JSON.stringify(data[0]));
    window.location.href = 'app.html';
  }

  async function signup() {
    const username = document.getElementById('signup-user').value.trim();
    const password = document.getElementById('signup-pass').value;
    if (!username || !password) { setMsg('Preenche todos os campos.'); return; }
    if (password.length < 4) { setMsg('Password com mínimo 4 caracteres.'); return; }
    const hash = await hashPassword(password);
    const res = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({ username, password_hash: hash })
    });
    if (res.ok) {
      setMsg('Conta criada! Podes fazer login.', 'green');
      switchTab('login');
    } else {
      const err = await res.json();
      setMsg(err.message?.includes('unique') ? 'Username já existe.' : 'Erro ao criar conta.');
    }
  }

  document.addEventListener('keydown', e => { if (e.key==='Enter') { document.getElementById('panel-login').classList.contains('active') ? login() : signup(); } });
</script>
</body>
</html>
