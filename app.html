<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Manager</title>
  <style>
    /* --- Variáveis globais para o APP --- */
    :root {
      --app-bg: #f0f2f5;
      --sec-bg: white;
      --text-color: #1a1a2e;
      --border-color: #f0f0f0;
      --input-border: #ddd;
      --input-bg: white;
      --table-th-bg: #f8f9fa;
      --table-th-text: #555;
      --tab-inactive: #e4e6eb;
    }

    body.dark-theme {
      --app-bg: #0f0f1a;
      --sec-bg: #161625;
      --text-color: #ffffff;
      --border-color: #222235;
      --input-border: #3f3f5a;
      --input-bg: #1e1e30;
      --table-th-bg: #1e1e30;
      --table-th-text: #bbb;
      --tab-inactive: #222235;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: var(--app-bg); min-height: 100vh; color: var(--text-color); transition: background 0.3s, color 0.3s; }

    /* NAVBAR */
    .navbar { background: #1a1a2e; color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border-color); }
    .navbar h1 { font-size: 18px; }
    .navbar-right { display: flex; align-items: center; gap: 10px; }
    .badge { background: #e94560; color: white; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: bold; }
    .badge.vista { background: #0f3460; }
    .btn-nav { background: none; border: 1px solid rgba(255,255,255,0.4); color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-nav:hover { background: rgba(255,255,255,0.1); }

    /* MAIN */
    .main { padding: 16px; max-width: 900px; margin: 0 auto; }

    /* SECTION */
    .section { background: var(--sec-bg); border-radius: 14px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); transition: background 0.3s; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .section-title { font-size: 18px; font-weight: bold; color: var(--text-color); }

    /* BUTTONS */
    .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #1a1a2e; color: white; }
    body.dark-theme .btn-primary { background: #3f3f5a; }
    .btn-success { background: #28a745; color: white; }
    .btn-danger { background: #dc3545; color: white; padding: 5px 10px; font-size: 12px; }
    .btn-edit { background: #ffc107; color: #333; padding: 5px 10px; font-size: 12px; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* TABLE */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 300px; }
    th { background: var(--table-th-bg); color: var(--table-th-text); padding: 10px 8px; text-align: left; font-size: 13px; border-bottom: 2px solid var(--border-color); }
    td { padding: 10px 8px; border-bottom: 1px solid var(--border-color); font-size: 14px; vertical-align: middle; color: var(--text-color); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255, 255, 255, 0.03); }
    a.link-cell { color: #51a2ff; word-break: break-all; }
    td.url-cell { max-width: 180px; }
    a.link-trunc {
      color: #51a2ff;
      display: inline-block;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* FORMS */
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .form-row input, .form-row textarea { flex: 1; min-width: 120px; padding: 10px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); border-radius: 8px; font-size: 14px; }
    .form-row textarea { resize: vertical; min-height: 80px; }

    /* CATEGORY */
    .cat-section { margin-bottom: 28px; }
    .cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .cat-title { font-size: 16px; font-weight: bold; color: var(--text-color); border-left: 4px solid #e94560; padding-left: 10px; }

    /* TEXTO PUBLICO */
    .texto-box { width: 100%; min-height: 120px; padding: 12px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); border-radius: 8px; font-size: 15px; resize: vertical; font-family: Arial; }
    .texto-meta { font-size: 12px; color: #999; margin-top: 6px; }
    .texto-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

    /* COPY BTN */
    .btn-copy { background: #0f3460; color: white; }

    /* ADD CATEGORY FORM */
    .add-form { display: flex; gap: 8px; flex-wrap: wrap; }
    .add-form input { flex: 1; min-width: 160px; padding: 10px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); border-radius: 8px; font-size: 14px; }

    /* MODAL */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--sec-bg); color: var(--text-color); border-radius: 14px; padding: 24px; width: 100%; max-width: 460px; border: 1px solid var(--border-color); }
    .modal h3 { margin-bottom: 16px; }
    .modal input { width: 100%; padding: 10px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); border-radius: 8px; font-size: 15px; margin-bottom: 10px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }

    /* EMPTY */
    .empty { color: #888; font-size: 14px; padding: 12px 0; text-align: center; }

    /* PHOTO GALLERY */
    .photo-list { display: flex; flex-direction: column; gap: 10px; }
    .photo-row { display: flex; align-items: center; gap: 12px; padding: 8px; border: 1px solid var(--border-color); border-radius: 10px; }
    .photo-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; flex-shrink: 0; background: #222; }
    .photo-actions { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
    .upload-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .upload-row input[type=file] { flex: 1; min-width: 160px; font-size: 13px; color: var(--text-color); }
    .spinner { font-size: 13px; color: #999; }

    /* TOP TABS */
    .top-tabs { display: flex; gap: 6px; padding: 10px 16px 0; flex-wrap: wrap; max-width: 900px; margin: 0 auto; }
    .top-tab { padding: 9px 16px; border: none; border-radius: 10px 10px 0 0; background: var(--tab-inactive); color: var(--text-color); opacity: 0.7; font-weight: bold; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .top-tab:hover { opacity: 1; }
    
    /* --- Cores das Abas Ativas Dinâmicas --- */
    .top-tab.active.tab-public { background: #0066cc !important; color: white !important; opacity: 1; box-shadow: 0 -2px 6px rgba(0,102,204,0.3); border: 1px solid #0055b3; border-bottom: none; }
    .top-tab.active.tab-personal { background: #28a745 !important; color: white !important; opacity: 1; box-shadow: 0 -2px 6px rgba(40,167,69,0.3); border: 1px solid #218838; border-bottom: none; }
    .top-tab.active.tab-admin { background: #8a2be2 !important; color: white !important; opacity: 1; box-shadow: 0 -2px 6px rgba(138,43,226,0.3); border: 1px solid #721cbe; border-bottom: none; }
    .top-tab.active.tab-user { background: #e94560 !important; color: white !important; opacity: 1; box-shadow: 0 -2px 6px rgba(233,69,96,0.3); border: 1px solid #d2334e; border-bottom: none; }

    @media (max-width: 500px) {
      .section { padding: 14px 12px; }
      .navbar h1 { font-size: 15px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <h1>🔗 Link Manager</h1>
  <div class="navbar-right">
    <span class="badge" id="modeBadge"></span>
    <span id="navUsername" style="font-size:13px;color:#ccc;"></span>
    <button class="btn-nav" id="app-theme-toggle" style="margin-right: 5px; font-size: 12px;">🌙 Alternar Tema</button>
    <button class="btn-nav" onclick="logout()">Sair</button>
  </div>
</nav>

<div class="top-tabs" id="topTabs"></div>
<div class="main" id="mainContent"></div>

<!-- MODAL EDITAR LINK -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>Editar Link</h3>
    <input id="edit-title" placeholder="Título">
    <input id="edit-url" placeholder="URL">
    <input id="edit-desc" placeholder="Descrição (opcional)">
    <input type="hidden" id="edit-id">
    <input type="hidden" id="edit-cat">
    <div class="modal-actions">
      <button class="btn" onclick="closeEditModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEditLink()">Guardar</button>
    </div>
  </div>
</div>

<script>
  // Script síncrono inicial para aplicar o tema IMEDIATAMENTE sem flash branco
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-theme');
  }
  
  // Botão interno para também permitir mudar de tema dentro da conta
  document.getElementById('app-theme-toggle').addEventListener('click', () => {
    document.body.classList.toggle('dark-theme');
    if (document.body.classList.contains('dark-theme')) {
      localStorage.setItem('theme', 'dark');
    } else {
      localStorage.setItem('theme', 'light');
    }
  });
</script>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

const SUPABASE_URL = "https://dasdhmgqldpqfcxmzgkl.supabase.co";
const SUPABASE_KEY = "sb_publishable_9MnjCDP_KC7wa_DMom1gsA_DCF65g42";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// AUTH
const user = JSON.parse(localStorage.getItem('user'));
if (!user) { window.location.href = 'index.html'; }
const isAdmin = user.is_admin === true;

document.getElementById('modeBadge').textContent = isAdmin ? 'ADMIN' : 'VISTA';
document.getElementById('modeBadge').className = 'badge' + (isAdmin ? '' : ' vista');
document.getElementById('navUsername').textContent = user.username;

window.logout = () => { localStorage.removeItem('user'); window.location.href = 'index.html'; };

// ─── TAB STATE ────────────────────────────────────────────────────────────────
let currentTab = 'public'; // 'public' | 'personal' | 'admin' | {userId}
let allUsers = [];

async function renderTabs() {
  const tabsDiv = document.getElementById('topTabs');
  let tabsHtml = `
    <button class="top-tab ${currentTab==='public'?'active tab-public':''}" onclick="switchTab('public')">📋 Vista Pública</button>
    <button class="top-tab ${currentTab==='personal'?'active tab-personal':''}" onclick="switchTab('personal')">👤 Pessoal</button>`;

  if (isAdmin) {
    tabsHtml += `<button class="top-tab ${currentTab==='admin'?'active tab-admin':''}" onclick="switchTab('admin')">🛠️ Admin</button>`;
    const { data: users } = await supabase.from('users').select('id, username').order('username');
    allUsers = users || [];
    allUsers.forEach(u => {
      tabsHtml += `<button class="top-tab ${currentTab===('user_'+u.id)?'active tab-user':''}" onclick="switchTab('user_${u.id}')">👤 ${u.username}</button>`;
    });
  }

  tabsDiv.innerHTML = tabsHtml;
}

window.switchTab = (tab) => {
  currentTab = tab;
  render();
};

// ─── RENDER ───────────────────────────────────────────────────────────────────
async function render() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  await renderTabs();

  if (currentTab === 'public') {
    await renderPublicView(main);
  } else if (currentTab === 'personal') {
    await renderPersonalArea(main, user.id, true);
  } else if (currentTab === 'admin') {
    await renderAdmin(main);
  } else if (currentTab.startsWith('user_')) {
    const uid = currentTab.replace('user_', '');
    const targetUser = allUsers.find(u => u.id === uid);
    main.innerHTML = `<div class="section"><div class="section-title">👤 Área de ${targetUser ? targetUser.username : ''}</div></div>`;
    await renderPersonalArea(main, uid, false);
  }
}

// ─── PUBLIC VIEW ───────────────────
async function renderPublicView(main) {
  const { data: vistaLinks } = await supabase.from('vista_publica').select('*').order('id');
  const vistaSection = document.createElement('div');
  vistaSection.className = 'section';
  vistaSection.innerHTML = `
    <div class="section-header">
      <div class="section-title">📋 Vista Pública</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Título</th><th>Link</th><th>Ações</th></tr></thead>
        <tbody id="vista-table">
          ${!vistaLinks || vistaLinks.length === 0
            ? '<tr><td colspan="3" class="empty">Sem links de momento.</td></tr>'
            : vistaLinks.map(l => vistaRow(l)).join('')}
        </tbody>
      </table>
    </div>
    <div class="form-row" style="margin-top:12px;">
      <input id="vt" placeholder="Título">
      <input id="vu" placeholder="URL">
      <button class="btn btn-primary btn-sm" onclick="addVistaLink()">+ Link</button>
    </div>`;
  main.appendChild(vistaSection);

  await renderPhotoGallery(main, 'vista_photos', 'vista-photos', '📷 Vista Pública — Fotos', true);
  renderTextoPublico(main, true);
}

// ─── PERSONAL AREA ─────────────
async function renderPersonalArea(main, targetUserId, isOwnArea) {
  const { data: links } = await supabase.from('personal_links').select('*').eq('user_id', targetUserId).order('id');
  const linksSection = document.createElement('div');
  linksSection.className = 'section';
  linksSection.innerHTML = `
    <div class="section-header"><div class="section-title">🔗 Links Pessoais</div></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Título</th><th>Link</th><th>Ações</th></tr></thead>
        <tbody id="personal-links-table">
          ${!links || links.length === 0
            ? '<tr><td colspan="3" class="empty">Sem links ainda.</td></tr>'
            : links.map(l => personalLinkRow(l)).join('')}
        </tbody>
      </table>
    </div>
    <div class="form-row" style="margin-top:12px;">
      <input id="pt" placeholder="Título">
      <input id="pu" placeholder="URL">
      <button class="btn btn-primary btn-sm" onclick="addPersonalLink('${targetUserId}')">+ Link</button>
    </div>`;
  main.appendChild(linksSection);

  await renderPersonalPhotoGallery(main, targetUserId);
  await renderPersonalTexto(main, targetUserId);
}

function personalLinkRow(l) {
  const icon = getFaviconUrl(l.url);
  return `<tr id="personal-link-row-${l.id}">
    <td>${icon ? `<img src="${icon}" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;border-radius:3px;" onerror="this.style.display='none'">` : ''}${l.title}</td>
    <td class="url-cell"><a class="link-trunc" href="${l.url}" target="_blank" title="${l.url}">${l.url}</a></td>
    <td><div class="actions">
      <button class="btn btn-copy btn-sm" onclick="copyToClipboard('${escJs(l.url)}')">Copiar</button>
      <button class="btn btn-danger btn-sm" onclick="deletePersonalLink(${l.id})">Apagar</button>
    </div></td>
  </tr>`;
}

window.addPersonalLink = async (targetUserId) => {
  const title = document.getElementById('pt').value.trim();
  const url = document.getElementById('pu').value.trim();
  if (!title || !url) { alert('Título e URL são obrigatórios.'); return; }
  const { error } = await supabase.from('personal_links').insert({ user_id: targetUserId, title, url });
  if (error) { alert('Erro ao adicionar link.'); console.error(error); return; }
  render();
};

window.deletePersonalLink = async (id) => {
  if (!confirm('Apagar este link?')) return;
  await supabase.from('personal_links').delete().eq('id', id);
  document.getElementById(`personal-link-row-${id}`)?.remove();
};

async function renderPersonalPhotoGallery(main, targetUserId) {
  const { data: photos } = await supabase.from('personal_photos').select('*').eq('user_id', targetUserId).order('created_at', { ascending: false });
  const bucketName = 'personal-photos';

  const sec = document.createElement('div');
  sec.className = 'section';

  const rows = (photos || []).map(p => {
    const { data: pub } = supabase.storage.from(bucketName).getPublicUrl(p.file_path);
    const url = pub.publicUrl;
    return `
      <div class="photo-row" id="photo-personal_photos-${p.id}">
        <img class="photo-thumb" src="${url}" alt="foto" onerror="this.style.opacity=0.2">
        <div class="photo-actions">
          <button class="btn btn-copy btn-sm" onclick="downloadPhoto('${url}', '${p.file_path}')">Download</button>
          <button class="btn btn-danger btn-sm" onclick="deletePersonalPhoto(${p.id},'${p.file_path}')">Apagar</button>
        </div>
      </div>`;
  }).join('');

  sec.innerHTML = `
    <div class="section-header"><div class="section-title">📷 Fotos Pessoais</div></div>
    <div class="photo-list" id="gallery-personal_photos">
      ${(!photos || photos.length === 0) ? '<div class="empty">Sem fotos ainda.</div>' : rows}
    </div>
    <div class="upload-row">
      <input type="file" id="upload-personal_photos" accept="image/*" multiple>
      <button class="btn btn-success btn-sm" onclick="uploadPersonalPhotos('${targetUserId}')">Carregar</button>
      <span class="spinner" id="spinner-personal_photos"></span>
    </div>`;
  main.appendChild(sec);
}

window.uploadPersonalPhotos = async (targetUserId) => {
  const input = document.getElementById('upload-personal_photos');
  const files = input.files;
  if (!files || files.length === 0) { alert('Escolhe pelo menos uma foto.'); return; }

  const spinner = document.getElementById('spinner-personal_photos');
  spinner.textContent = 'A carregar...';
  let okCount = 0, errors = [];

  for (const file of files) {
    const ext = file.name.split('.').pop();
    const path = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const { error: upErr } = await supabase.storage.from('personal-photos').upload(path, file);
    if (upErr) { errors.push(`Upload: ${upErr.message}`); continue; }
    const { error: insErr } = await supabase.from('personal_photos').insert({ user_id: targetUserId, file_path: path });
    if (insErr) { errors.push(`Tabela: ${insErr.message}`); continue; }
    okCount++;
  }

  spinner.textContent = '';
  input.value = '';
  if (errors.length > 0) alert(`${okCount} foto(s) carregada(s).\n\nErros:\n${errors.join('\n')}`);
  render();
};

window.deletePersonalPhoto = async (id, filePath) => {
  if (!confirm('Apagar esta foto?')) return;
  await supabase.from('personal-photos').remove([filePath]);
  await supabase.from('personal_photos').delete().eq('id', id);
  document.getElementById(`photo-personal_photos-${id}`)?.remove();
};

async function renderPersonalTexto(main, targetUserId) {
  const { data } = await supabase.from('personal_texto').select('*').eq('user_id', targetUserId).order('created_at', { ascending: true });
  const notes = data || [];

  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `
    <div class="section-header">
      <div class="section-title">📝 Texto Pessoal</div>
      <button class="btn btn-success btn-sm" onclick="addPersonalTextoBox('${targetUserId}')">+ Nova Caixa</button>
    </div>
    <div id="personal-texto-list">
      ${notes.length === 0 ? '<div class="empty">Sem caixas de texto ainda.</div>' : ''}
      ${notes.map(n => personalTextoBoxHtml(n)).join('')}
    </div>`;
  main.appendChild(sec);
}

function personalTextoBoxHtml(n) {
  return `
    <div class="texto-item" id="personal-texto-item-${n.id}" style="margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border-color);">
      <textarea class="texto-box" id="personal-texto-content-${n.id}" placeholder="Escreve aqui...">${n.content || ''}</textarea>
      <div class="texto-meta">${n.updated_at ? `Última edição: ${new Date(n.updated_at).toLocaleString()}` : ''}</div>
      <div class="texto-actions">
        <button class="btn btn-primary btn-sm" onclick="savePersonalTexto(${n.id})">Guardar</button>
        <button class="btn btn-copy btn-sm" onclick="copyPersonalTexto(${n.id})">Copiar</button>
        <button class="btn btn-danger btn-sm" onclick="deletePersonalTexto(${n.id})">Apagar</button>
      </div>
    </div>`;
}

window.addPersonalTextoBox = async (targetUserId) => {
  const { error } = await supabase.from('personal_texto').insert({ user_id: targetUserId, content: '' });
  if (error) { alert('Erro ao criar caixa.'); console.error(error); return; }
  render();
};

window.savePersonalTexto = async (id) => {
  const content = document.getElementById(`personal-texto-content-${id}`).value;
  const { error } = await supabase.from('personal_texto').update({ content, updated_at: new Date().toISOString() }).eq('id', id);
  if (error) { alert('Erro ao guardar.'); return; }
  alert('Guardado!');
  render();
};

window.copyPersonalTexto = (id) => {
  const t = document.getElementById(`personal-texto-content-${id}`).value;
  navigator.clipboard.writeText(t).then(() => alert('Copiado!')).catch(() => alert('Erro.'));
};

window.deletePersonalTexto = async (id) => {
  if (!confirm('Apagar esta caixa de texto?')) return;
  await supabase.from('personal_texto').delete().eq('id', id);
  document.getElementById(`personal-texto-item-${id}`)?.remove();
};

// ─── ADMIN MODE ───────────────────────────────────────────────────────────────
async function renderAdmin(main) {
  const { data: cats } = await supabase.from('categories').select('*').order('position');
  const { data: links } = await supabase.from('links').select('*').order('id');

  const catsSection = document.createElement('div');
  catsSection.className = 'section';
  catsSection.innerHTML = `<div class="section-header"><div class="section-title">📁 Categorias & Links</div></div>`;

  const addCatDiv = document.createElement('div');
  addCatDiv.innerHTML = `
    <div class="add-form" style="margin-bottom:20px;">
      <input id="new-cat-name" placeholder="Nome da nova categoria">
      <button class="btn btn-success" onclick="addCategory()">+ Categoria</button>
    </div>`;
  catsSection.appendChild(addCatDiv);

  if (cats && cats.length > 0) {
    cats.forEach(cat => {
      const catLinks = (links || []).filter(l => l.category_id === cat.id);
      const catDiv = document.createElement('div');
      catDiv.className = 'cat-section';
      catDiv.id = `cat-${cat.id}`;
      catDiv.innerHTML = `
        <div class="cat-header">
          <div class="cat-title">${cat.name}</div>
          <button class="btn btn-danger btn-sm" onclick="deleteCategory(${cat.id})">Apagar Categoria</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Título</th><th>URL</th><th>Descrição</th><th>Ações</th></tr></thead>
            <tbody id="links-${cat.id}">
              ${catLinks.length === 0
                ? '<tr><td colspan="4" class="empty">Sem links nesta categoria.</td></tr>'
                : catLinks.map(l => linkRow(l)).join('')}
            </tbody>
          </table>
        </div>
        <div class="form-row" style="margin-top:12px;" id="addlink-${cat.id}">
          <input id="lt-${cat.id}" placeholder="Título">
          <input id="lu-${cat.id}" placeholder="URL">
          <input id="ld-${cat.id}" placeholder="Descrição (opcional)">
          <button class="btn btn-primary btn-sm" onclick="addLink(${cat.id})">+ Link</button>
        </div>`;
      catsSection.appendChild(catDiv);
    });
  } else {
    const empty = document.createElement('p');
    empty.className = 'empty';
    empty.textContent = 'Nenhuma categoria criada ainda.';
    catsSection.appendChild(empty);
  }

  main.appendChild(catsSection);

  const { data: vistaLinks } = await supabase.from('vista_publica').select('*').order('id');
  const vistaSection = document.createElement('div');
  vistaSection.className = 'section';
  vistaSection.innerHTML = `
    <div class="section-header">
      <div class="section-title">📋 Vista Pública</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Título</th><th>URL</th><th>Ações</th></tr></thead>
        <tbody id="vista-admin-table">
          ${!vistaLinks || vistaLinks.length === 0
            ? '<tr><td colspan="3" class="empty">Sem links.</td></tr>'
            : vistaLinks.map(l => vistaRow(l)).join('')}
        </tbody>
      </table>
    </div>
    <div class="form-row" style="margin-top:12px;">
      <input id="vt" placeholder="Título">
      <input id="vu" placeholder="URL">
      <button class="btn btn-primary btn-sm" onclick="addVistaLink()">+ Link</button>
    </div>`;
  main.appendChild(vistaSection);

  await renderPhotoGallery(main, 'admin_photos', 'admin-photos', '🔒 Galeria Admin — Fotos', true);
  await renderPhotoGallery(main, 'vista_photos', 'vista-photos', '📷 Vista Pública — Fotos', true);
  renderTextoPublico(main, false);
}

function linkRow(l) {
  const icon = getFaviconUrl(l.url);
  return `<tr id="link-row-${l.id}">
    <td>${icon ? `<img src="${icon}" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;border-radius:3px;" onerror="this.style.display='none'">` : ''}${l.title}</td>
    <td class="url-cell">
      <a class="link-trunc" href="${l.url}" target="_blank" title="${l.url}">${l.url}</a>
      <button class="btn btn-copy btn-sm" style="margin-left:4px;" onclick="copyToClipboard('${escJs(l.url)}')">Copiar</button>
    </td>
    <td>${l.description || '-'}</td>
    <td><div class="actions">
      <button class="btn btn-edit" onclick="openEditModal(${l.id},'${escJs(l.title)}','${escJs(l.url)}','${escJs(l.description||'')}',${l.category_id})">Editar</button>
      <button class="btn btn-danger" onclick="deleteLink(${l.id})">Apagar</button>
    </div></td>
  </tr>`;
}

function vistaRow(l) {
  const icon = getFaviconUrl(l.url);
  return `<tr id="vista-row-${l.id}">
    <td>${icon ? `<img src="${icon}" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;border-radius:3px;" onerror="this.style.display='none'">` : ''}${l.title}</td>
    <td class="url-cell"><a class="link-trunc" href="${l.url}" target="_blank" title="${l.url}">${l.url}</a></td>
    <td><div class="actions">
      <button class="btn btn-copy btn-sm" onclick="copyToClipboard('${escJs(l.url)}')">Copiar</button>
      <button class="btn btn-danger btn-sm" onclick="deleteVistaLink(${l.id})">Apagar</button>
    </div></td>
  </tr>`;
}

function escJs(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

function getFaviconUrl(url) {
  try { const domain = new URL(url).hostname; return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`; } catch (e) { return ''; }
}

// ─── GALERIA DE FOTOS ─────────────────────────────────────────────────────────
async function renderPhotoGallery(main, tableName, bucketName, titleLabel, canManage) {
  const { data: photos } = await supabase.from(tableName).select('*').order('created_at', { ascending: false });
  const sec = document.createElement('div');
  sec.className = 'section';

  const rows = (photos || []).map(p => {
    const { data: pub } = supabase.storage.from(bucketName).getPublicUrl(p.file_path);
    const url = pub.publicUrl;
    return `
      <div class="photo-row" id="photo-${tableName}-${p.id}">
        <img class="photo-thumb" src="${url}" alt="foto" onerror="this.style.opacity=0.2">
        <div class="photo-actions">
          <button class="btn btn-copy btn-sm" onclick="downloadPhoto('${url}', '${p.file_path}')">Download</button>
          ${canManage ? `<button class="btn btn-danger btn-sm" onclick="deletePhoto('${tableName}','${bucketName}',${p.id},'${p.file_path}')">Apagar</button>` : ''}
        </div>
      </div>`;
  }).join('');

  sec.innerHTML = `
    <div class="section-header"><div class="section-title">${titleLabel}</div></div>
    <div class="photo-list" id="gallery-${tableName}">
      ${(!photos || photos.length === 0) ? '<div class="empty">Sem fotos ainda.</div>' : rows}
    </div>
    ${canManage ? `
      <div class="upload-row">
        <input type="file" id="upload-${tableName}" accept="image/*" multiple>
        <button class="btn btn-success btn-sm" onclick="uploadPhotos('${tableName}','${bucketName}')">Carregar</button>
        <span class="spinner" id="spinner-${tableName}"></span>
      </div>` : ''}
  `;
  main.appendChild(sec);
}

window.uploadPhotos = async (tableName, bucketName) => {
  const input = document.getElementById(`upload-${tableName}`);
  const files = input.files;
  if (!files || files.length === 0) { alert('Escolhe pelo menos uma foto.'); return; }
  const spinner = document.getElementById(`spinner-${tableName}`);
  spinner.textContent = 'A carregar...';
  let okCount = 0, errors = [];

  for (const file of files) {
    const ext = file.name.split('.').pop();
    const path = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const { error: upErr } = await supabase.storage.from(bucketName).upload(path, file);
    if (upErr) { errors.push(`Upload: ${upErr.message}`); continue; }
    const { error: insErr } = await supabase.from(tableName).insert({ file_path: path });
    if (insErr) { errors.push(`Tabela: ${insErr.message}`); continue; }
    okCount++;
  }
  spinner.textContent = '';
  input.value = '';
  if (errors.length > 0) alert(`${okCount} foto(s) carregada(s).\n\nErros:\n${errors.join('\n')}`);
  render();
};

window.downloadPhoto = async (url, filename) => {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
  } catch (e) { window.open(url, '_blank'); }
};

window.deletePhoto = async (tableName, bucketName, id, filePath) => {
  if (!confirm('Apagar esta foto?')) return;
  await supabase.storage.from(bucketName).remove([filePath]);
  await supabase.from(tableName).delete().eq('id', id);
  document.getElementById(`photo-${tableName}-${id}`)?.remove();
};

// ─── TEXTO PÚBLICO ────────────────────────────────────────────────────────────
async function renderTextoPublico(main, vistaMode) {
  const { data } = await supabase.from('texto_publico').select('*').order('created_at', { ascending: true });
  const notes = data || [];
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `
    <div class="section-header">
      <div class="section-title">📝 Texto Público</div>
      <button class="btn btn-success btn-sm" onclick="addTextoBox()">+ Nova Caixa</button>
    </div>
    <div id="texto-list">
      ${notes.length === 0 ? '<div class="empty">Sem caixas de texto ainda. Clica em "+ Nova Caixa".</div>' : ''}
      ${notes.map(n => textoBoxHtml(n)).join('')}
    </div>`;
  main.appendChild(sec);
}

function textoBoxHtml(n) {
  return `
    <div class="texto-item" id="texto-item-${n.id}" style="margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border-color);">
      <textarea class="texto-box" id="texto-content-${n.id}" placeholder="Escreve aqui...">${n.content || ''}</textarea>
      <div class="texto-meta">${n.updated_at ? `Última edição: ${new Date(n.updated_at).toLocaleString()}` : ''}</div>
      <div class="texto-actions">
        <button class="btn btn-primary btn-sm" onclick="saveTexto(${n.id})">Guardar</button>
        <button class="btn btn-copy btn-sm" onclick="copyTexto(${n.id})">Copiar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTexto(${n.id})">Apagar</button>
      </div>
    </div>`;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
window.copyToClipboard = (text) => {
  navigator.clipboard.writeText(text).then(() => alert('Copiado!')).catch(() => alert('Erro ao copiar.'));
};

window.copyTexto = (id) => {
  const t = document.getElementById(`texto-content-${id}`).value;
  navigator.clipboard.writeText(t).then(() => alert('Copiado!')).catch(() => alert('Erro.'));
};

window.addTextoBox = async () => {
  const { error } = await supabase.from('texto_publico').insert({ content: '', user_id: user.id });
  if (error) { alert('Erro ao criar caixa.'); console.error(error); return; }
  render();
};

window.saveTexto = async (id) => {
  const content = document.getElementById(`texto-content-${id}`).value;
  const { error } = await supabase.from('texto_publico').update({ content, updated_at: new Date().toISOString() }).eq('id', id);
  if (error) { alert('Erro ao guardar.'); return; }
  alert('Guardado!');
  render();
};

window.deleteTexto = async (id) => {
  if (!confirm('Apagar esta caixa de texto?')) return;
  await supabase.from('texto_publico').delete().eq('id', id);
  document.getElementById(`texto-item-${id}`)?.remove();
};

window.addCategory = async () => {
  const name = document.getElementById('new-cat-name').value.trim();
  if (!name) { alert('Escreve o nome da categoria.'); return; }
  const { error } = await supabase.from('categories').insert({ name, position: 999 });
  if (error) { alert('Erro ao criar categoria.'); return; }
  render();
};

window.deleteCategory = async (id) => {
  if (!confirm('Apagar esta categoria e todos os links dentro dela?')) return;
  await supabase.from('links').delete().eq('category_id', id);
  await supabase.from('categories').delete().eq('id', id);
  render();
};

window.addLink = async (catId) => {
  const title = document.getElementById(`lt-${catId}`).value.trim();
  const url = document.getElementById(`lu-${catId}`).value.trim();
  const description = document.getElementById(`ld-${catId}`).value.trim();
  if (!title || !url) { alert('Título e URL são obrigatórios.'); return; }
  const { error } = await supabase.from('links').insert({ category_id: catId, title, url, description });
  if (error) { alert('Erro ao adicionar link.'); return; }
  render();
};

window.deleteLink = async (id) => {
  if (!confirm('Apagar este link?')) return;
  await supabase.from('links').delete().eq('id', id);
  document.getElementById(`link-row-${id}`)?.remove();
};

window.openEditModal = (id, title, url, desc, catId) => {
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-title').value = title;
  document.getElementById('edit-url').value = url;
  document.getElementById('edit-desc').value = desc;
  document.getElementById('edit-cat').value = catId;
  document.getElementById('editModal').classList.add('open');
};

window.closeEditModal = () => document.getElementById('editModal').classList.remove('open');

window.saveEditLink = async () => {
  const id = document.getElementById('edit-id').value;
  const title = document.getElementById('edit-title').value.trim();
  const url = document.getElementById('edit-url').value.trim();
  const description = document.getElementById('edit-desc').value.trim();
  if (!title || !url) { alert('Título e URL são obrigatórios.'); return; }
  const { error } = await supabase.from('links').update({ title, url, description }).eq('id', id);
  if (error) { alert('Erro ao editar.'); return; }
  closeEditModal();
  render();
};

window.addVistaLink = async () => {
  const title = document.getElementById('vt').value.trim();
  const url = document.getElementById('vu').value.trim();
  if (!title || !url) { alert('Título e URL são obrigatórios.'); return; }
  const { error } = await supabase.from('vista_publica').insert({ title, url });
  if (error) { alert('Erro ao adicionar.'); return; }
  render();
};

window.deleteVistaLink = async (id) => {
  if (!confirm('Apagar este link da Vista Pública?')) return;
  await supabase.from('vista_publica').delete().eq('id', id);
  document.getElementById(`vista-row-${id}`)?.remove();
};

render();
</script>
